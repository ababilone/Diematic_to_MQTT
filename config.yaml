name: "Diematic to MQTT"
description: "Modbus bridge for De Dietrich Diematic boilers via USB RS485 or TCP"
version: "2.0.0"
slug: "diematic_to_mqtt"
url: "https://github.com/ababilone/Diematic_to_MQTT"
init: false
arch:
  - aarch64
  - armhf
  - armv7
  - amd64
  - i386
uart: true

options:
  connection_type: "serial"
  serial_port: "/dev/ttyUSB0"
  serial_baudrate: 9600
  tcp_ip: ""
  tcp_port: 20108
  regulator_address: "0x0A"
  regulator_type: "Diematic3"
  timezone: "Europe/Paris"
  time_sync: false
  period: 10
  enable_circuit_a: false
  enable_circuit_b: false
  nozzle_flow_rate: 0.0
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_login: ""
  mqtt_password: ""
  mqtt_topic_prefix: "home/heater"
  mqtt_client_id: "boiler"
  ha_discovery_enable: true
  ha_discovery_prefix: "homeassistant"

schema:
  connection_type: "list(serial|tcp)"
  # Serial mode – leave empty when using TCP
  serial_port: str?
  serial_baudrate: int?
  # TCP mode – leave empty when using serial
  tcp_ip: str?
  tcp_port: int?
  regulator_address: str
  regulator_type: "list(Diematic3|Diematic4|DiematicDelta)"
  timezone: str
  time_sync: bool
  period: int
  enable_circuit_a: bool
  enable_circuit_b: bool
  nozzle_flow_rate: float
  mqtt_host: str
  mqtt_port: int
  mqtt_login: str?
  mqtt_password: password?
  mqtt_topic_prefix: str
  mqtt_client_id: str
  ha_discovery_enable: bool
  ha_discovery_prefix: str
